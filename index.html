<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="MoneyTracker Pro">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src * data: 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline';">
    
    <link rel="manifest" href="manifest.json">
    <!-- Icône SVG intégrée (ne nécessite pas de fichier externe) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text y='.9em' font-size='90' x='50%' text-anchor='middle'>💰</text></svg>">
    
    <title>💰 MoneyTracker Pro</title>
    
    <style>
        /* Styles de base pour éviter l'écran blanc */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Écran de chargement visible immédiatement */
        #splash {
            text-align: center;
            padding: 20px;
        }
        #splash .logo { font-size: 4rem; animation: bounce 1s infinite; }
        #splash .text { margin-top: 10px; opacity: 0.8; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* L'app réelle (cachée au début) */
        #app { display: none; width: 100%; height: 100vh; }
        #app.loaded { display: flex; flex-direction: column; }
        #app.error { display: flex; align-items: center; justify-content: center; }
        
        /* Styles minimaux pour l'app */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        .hd { background: rgba(0,0,0,0.3); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
        .hd h1 { font-size: 1.2rem; margin: 0; }
        .mn { flex: 1; overflow-y: auto; padding: 16px; max-width: 500px; margin: 0 auto; width: 100%; }
        .cd { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 12px; margin-bottom: 12px; text-align: center; }
        .cd.g { background: linear-gradient(135deg, #00b894, #00cec9); }
        .cd.d { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .cd.s { background: linear-gradient(135deg, #3498db, #2980b9); }
        .cd h3 { font-size: 0.8rem; opacity: 0.9; margin-bottom: 4px; }
        .cd .amt { font-size: 1.5rem; font-weight: bold; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; color: white; }
        .btn.g { background: linear-gradient(135deg, #00b894, #00cec9); }
        .btn.d { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .tx { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; }
        .tx-am { font-weight: bold; margin-left: auto; }
        .tx-am.g { color: #00b894; }
        .tx-am.d { color: #e74c3c; }
        .fl { display: flex; gap: 8px; margin-bottom: 12px; }
        .ch { padding: 8px 16px; background: rgba(255,255,255,0.1); border: none; border-radius: 20px; color: white; cursor: pointer; }
        .ch.on { background: #3498db; }
        .err { background: #e74c3c; padding: 20px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. Splash Screen (Visible immédiatement) -->
    <div id="splash">
        <div class="logo">💰</div>
        <div class="text">Chargement...</div>
    </div>

    <!-- 2. Application (Affichée par JS si tout va bien) -->
    <div id="app">
        <header class="hd">
            <h1>💰 MoneyTracker</h1>
            <button onclick="clearData()" style="background:none;border:none;color:white;font-size:1.2em">⚙️</button>
        </header>
        <main class="mn" id="main">
            <!-- Contenu généré par JS -->
        </main>
    </div>

    <script>
        // ========================
        // GESTION D'ERREUR GLOBALE
        // ========================
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error("Erreur: ", msg, url, lineNo);
            document.getElementById('splash').innerHTML = `
                <div class="err">
                    <h2>⚠️ Erreur détectée</h2>
                    <p style="font-size:0.8rem">${msg}</p>
                    <button class="btn g" onclick="location.reload()">Réessayer</button>
                </div>
            `;
            return true;
        };

        // ========================
        // DONNÉES
        // ========================
        let data = { tx: [], cfg: { cur: '€', bud: 0 } };
        
        function load() {
            try {
                const saved = localStorage.getItem('mtp_data');
                if (saved) data = JSON.parse(saved);
            } catch (e) { console.log("Reset données"); localStorage.clear(); }
        }

        function save() {
            try { localStorage.setItem('mtp_data', JSON.stringify(data)); } catch (e) {}
        }

        // ========================
        // INTERFACE
        // ========================
        const CTX = {
            d: ['🍕 Alimentation', '🚗 Transport', '🏠 Logement', '🎮 Loisirs', '💊 Santé', '🛍️ Shopping', '📄 Factures', '📦 Autre'],
            g: ['💼 Salaire', '💻 Freelance', '📈 Investissement', '🎁 Cadeau', '💰 Autre']
        };

        function fmt(n) { return n.toFixed(2) + ' ' + data.cfg.cur; }

        function render() {
            const m = document.getElementById('main');
            const gains = data.tx.filter(t => t.t === 'g').reduce((s, t) => s + t.a, 0);
            const deps = data.tx.filter(t => t.t === 'd').reduce((s, t) => s + t.a, 0);
            
            m.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
                    <div class="cd g"><h3>📈 Gains</h3><div class="amt">${fmt(gains)}</div></div>
                    <div class="cd d"><h3>📉 Dépenses</h3><div class="amt">${fmt(deps)}</div></div>
                </div>
                <div class="cd s"><h3>💵 Solde</h3><div class="amt">${fmt(gains - deps)}</div></div>
                
                <div class="fl">
                    <button class="btn g" onclick="add('g')">➕ Gain</button>
                    <button class="btn d" onclick="add('d')">➖ Dépense</button>
                </div>

                <h3 style="margin-bottom:10px">📋 Dernières transactions</h3>
                <div id="list"></div>
            `;

            const list = document.getElementById('list');
            if (data.tx.length === 0) {
                list.innerHTML = '<p style="opacity:0.5;text-align:center">Aucune transaction</p>';
            } else {
                list.innerHTML = data.tx.slice(0, 20).map(t => `
                    <div class="tx">
                        <span>${t.c}</span>
                        <span style="opacity:0.7;font-size:0.8rem;margin-left:8px">${t.d}</span>
                        <span class="tx-am ${t.t === 'g' ? 'g' : 'd'}">${t.t === 'g' ? '+' : '-'}${fmt(t.a)}</span>
                        <button onclick="del(${t.id})" style="background:none;border:none;cursor:pointer">🗑️</button>
                    </div>
                `).join('');
            }
        }

        function add(type) {
            const amt = prompt("Montant ?");
            if (!amt || isNaN(amt)) return;
            
            const cats = type === 'g' ? CTX.g : CTX.d;
            const cat = prompt("Catégorie:\n" + cats.join("\n")) || "📦 Autre";
            const desc = prompt("Description (optionnelle)") || cat.split(' ')[1] || "Transaction";

            data.tx.unshift({
                id: Date.now(),
                t: type,
                a: parseFloat(amt),
                c: cat.split(' ')[0], // Juste l'emoji
                d: desc,
                date: new Date().toISOString()
            });
            save();
            render();
        }

        function del(id) {
            if (confirm("Supprimer ?")) {
                data.tx = data.tx.filter(t => t.id !== id);
                save();
                render();
            }
        }

        function clearData() {
            if (confirm("Réinitialiser toutes les données ?")) {
                localStorage.clear();
                data = { tx: [], cfg: { cur: '€', bud: 0 } };
                render();
            }
        }

        // ========================
        // DÉMARRAGE SÉCURISÉ
        // ========================
        function init() {
            try {
                load();
                render();
                
                // Masquer splash, afficher app
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').classList.add('loaded');
                
                // Enregistrer Service Worker (optionnel, ne bloque pas si erreur)
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(e => console.log("SW ignoré", e));
                }
            } catch (e) {
                // Afficher l'erreur directement dans le splash
                document.getElementById('splash').innerHTML = `
                    <div class="err">
                        <h2>⚠️ Erreur critique</h2>
                        <p>${e.message}</p>
                        <button class="btn g" onclick="location.reload()">Relancer</button>
                    </div>
                `;
            }
        }

        // Lancer après un tout petit délai pour laisser le DOM s'afficher
        setTimeout(init, 100);
    </script>
</body>
</html>
